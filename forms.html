<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forms</title>
</head>
<body>
    <form>
        text:<input type="text"><br><br>
        Number:<input type="number"><br><br>
        Email:<input type="Email"><br><br>
        Password:<input type="password"><br><br>
        date:<input type="date"><br><br>
        time:<input type="time"><br><br>
        file:<input type="file"><br><br>

        <input type="Submit" value="Submit">
        <input type="reset" value="reset">

        <button type="submit">submit</button>
        <button type="reset">reset</button>

    </form>
    <h2>checkbox example</h2>
    <h3>My hobbies</h3>
    <input type="checkbox">Coding<br>
    <input type="checkbox">Watching sports<br>
    <input type="checkbox">Sleeping<br>

    <h2>Gender</h2>
    <input type="radio" name="gender">male<br>
    <input type="radio"  name="gender">female<br>
    <input type="radio" name="gender">others<br>

    
</body>
</html>
