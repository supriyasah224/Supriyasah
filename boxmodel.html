<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Box Model</title>
    <style>
        *{
            margin: 0;
            padding:0;
            box-sizing: border-box;
        }
        .box{
            height: 200px;
            width:200px;
            background-color: blue;
            padding-left: 10px;
            border: 2px solid red;
        }
        .box:hover{
            background-color: yellow;
            cursor: pointer;
        }

    </style>
</head>
<body>
    <div class="box">
        Hello world
    </div>
    
</body>
</html>
